services:
  - type: web
    name: nomics-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind=0.0.0.0:$PORT --workers=2 --timeout=120 --preload
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SITE_URL
        value: https://nomics-api.onrender.com
      - key: BNB_WALLET
        sync: false
      - key: ETH_WALLET
        sync: false
      - key: SOL_WALLET
        sync: false
