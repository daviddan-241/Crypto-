services:
  - type: web
    name: pf-raid-whales-bot
    env: python
    plan: free    # or starter / team depending on your needs
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      # Adsecrets if needed later (e.g. TOKEN as secret)
