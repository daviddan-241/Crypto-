services:
  - type: web
    name: nomics-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python api.py
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SITE_URL
        value: https://nomics.replit.app
      - key: BNB_WALLET
        sync: false
      - key: ETH_WALLET
        sync: false
      - key: SOL_WALLET
        sync: false

  - type: web
    name: nomics-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SITE_URL
        value: https://nomics.replit.app
      - key: BNB_WALLET
        sync: false
      - key: ETH_WALLET
        sync: false
      - key: SOL_WALLET
        sync: false
      - key: PORT
        value: "5000"
